# AgentHub 基础设施服务 — 部署在远程服务器
# 用法: docker compose -f docker-compose.infra.yml up -d
#
# 仅包含 PostgreSQL / Milvus / Elasticsearch / Neo4j 及其依赖。
# 前后端在本机运行，通过 .env.local 指向服务器 IP。

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub"]
      interval: 5s
      retries: 5
    ports:
      - "5432:5432"
    restart: unless-stopped

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://milvus-etcd:2379
    volumes: ["etcddata:/etcd"]
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health", "--endpoints=http://localhost:2379"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  milvus-minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    volumes: ["miniodata:/minio_data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.17
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
    depends_on:
      milvus-etcd: { condition: service_healthy }
      milvus-minio: { condition: service_healthy }
    volumes: ["milvusdata:/var/lib/milvus"]
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.14.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes: ["esdata:/usr/share/elasticsearch/data"]
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/agenthub-neo4j
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes: ["neo4jdata:/data"]
    restart: unless-stopped

volumes:
  pgdata:
  etcddata:
  miniodata:
  milvusdata:
  esdata:
  neo4jdata:
